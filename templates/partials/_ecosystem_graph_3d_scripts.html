<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1.73.3/dist/3d-force-graph.min.js"></script>
<script>
(function () {
  const API_URL = '/agent-setup-packs/api/ecosystem-graph';
  const COLOR_INSTALLED = '#22c55e';
  const COLOR_PENDING = '#1e3a8a';
  const COLOR_SELECTED = '#fde047';

  const modal = document.getElementById('ecosystem-graph-modal');
  const container = document.getElementById('ecosystem-graph-3d');
  const summaryEl = document.getElementById('graph-summary');
  const legendEl = document.getElementById('graph-legend');
  const detailEl = document.getElementById('graph-node-detail');
  const loadingEl = document.getElementById('graph-loading');
  const openBtn = document.getElementById('open-ecosystem-graph');
  const filterPack = document.getElementById('graph-filter-pack');
  const filterInstalled = document.getElementById('graph-filter-installed');
  const filterCross = document.getElementById('graph-filter-cross');
  const resetCameraBtn = document.getElementById('graph-reset-camera');

  let graph3d = null;
  let fullGraph = null;
  let selectedNodeId = null;

  const CAMERA_DEFAULT = { x: 0, y: 60, z: 480 };
  const SIDEBAR_WIDTH = 176;
  const PACK_CLUSTER_RADIUS = 105;
  const PACK_SPHERE_RADIUS_MIN = 22;
  const PACK_SPHERE_RADIUS_MAX = 46;
  const GOLDEN_ANGLE = Math.PI * (3 - Math.sqrt(5));

  if (!openBtn || !modal || !container) return;
  if (typeof ForceGraph3D !== 'function') {
    console.error('3d-force-graph failed to load');
    return;
  }

  function setLoading(on) {
    if (!loadingEl) return;
    loadingEl.style.opacity = on ? '1' : '0';
    loadingEl.classList.toggle('invisible', !on);
  }

  function graphDimensions() {
    const w = container.clientWidth;
    const h = container.clientHeight;
    return {
      width: w > 80 ? w : Math.max(window.innerWidth - SIDEBAR_WIDTH - 24, 720),
      height: h > 80 ? h : Math.max(window.innerHeight - 88, 520),
    };
  }

  function cloneNode(n) {
    return {
      id: n.id,
      name: n.name,
      catalog_key: n.catalog_key,
      pack_label: n.pack_label,
      resource_type: n.resource_type,
      installed: !!n.installed,
      alias: n.alias,
      detail_url: n.detail_url,
    };
  }

  function linkEndpointId(endpoint) {
    if (endpoint == null) return '';
    if (typeof endpoint === 'object') return endpoint.id || '';
    return String(endpoint);
  }

  function cloneLink(l) {
    return {
      source: linkEndpointId(l.source),
      target: linkEndpointId(l.target),
      edge_type: l.edge_type,
      color: l.color,
    };
  }

  function openModal() {
    modal.classList.remove('hidden');
    modal.setAttribute('aria-hidden', 'false');
    document.body.classList.add('overflow-hidden');
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        if (!fullGraph) {
          loadGraph();
        } else if (graph3d) {
          resizeGraph();
          resetCamera(false);
        } else {
          applyFilters();
        }
      });
    });
  }

  function closeModal() {
    modal.classList.add('hidden');
    modal.setAttribute('aria-hidden', 'true');
    document.body.classList.remove('overflow-hidden');
  }

  function resizeGraph() {
    if (!graph3d) return;
    const dim = graphDimensions();
    graph3d.width(dim.width);
    graph3d.height(dim.height);
  }

  function renderLegend(items) {
    legendEl.innerHTML = (items || []).map(function (item) {
      return '<li class="flex items-center gap-2"><span class="h-2.5 w-2.5 rounded-full shrink-0" style="background:' +
        item.color + '"></span><span>' + item.label + '</span></li>';
    }).join('');
  }

  function populatePackFilter(packs) {
    const current = filterPack.value;
    filterPack.innerHTML = '<option value="">All packs</option>';
    (packs || []).forEach(function (p) {
      const opt = document.createElement('option');
      opt.value = p.key;
      opt.textContent = p.short_name || p.key;
      filterPack.appendChild(opt);
    });
    const hasCurrent = current && Array.from(filterPack.options).some(function (o) {
      return o.value === current;
    });
    filterPack.value = hasCurrent ? current : '';
  }

  function filteredGraphData() {
    if (!fullGraph) return { nodes: [], links: [] };
    const packKey = filterPack.value;
    const onlyInstalled = filterInstalled.checked;
    const showCross = filterCross.checked;

    const nodes = fullGraph.nodes.filter(function (n) {
      if (packKey && n.catalog_key !== packKey) return false;
      if (onlyInstalled && !n.installed) return false;
      return true;
    });
    const nodeIds = new Set(nodes.map(function (n) { return n.id; }));

    const links = fullGraph.links.filter(function (l) {
      if (l.edge_type === 'cross_pack' && !showCross) return false;
      return nodeIds.has(l.source) && nodeIds.has(l.target);
    }).map(cloneLink);

    return {
      nodes: nodes.map(cloneNode),
      links: links,
    };
  }

  function packSphereRadius(nodeCount) {
    if (nodeCount <= 1) return PACK_SPHERE_RADIUS_MIN;
    return Math.min(
      PACK_SPHERE_RADIUS_MAX,
      PACK_SPHERE_RADIUS_MIN + nodeCount * 2.2
    );
  }

  function pointOnSphere(i, count, radius) {
    if (count <= 1) return { x: 0, y: 0, z: 0 };
    const t = (i + 0.5) / count;
    const inclination = Math.acos(1 - 2 * t);
    const azimuth = GOLDEN_ANGLE * i;
    return {
      x: radius * Math.sin(inclination) * Math.cos(azimuth),
      y: radius * Math.sin(inclination) * Math.sin(azimuth),
      z: radius * Math.cos(inclination),
    };
  }

  function seedPackSphereLayout(nodes, packs) {
    const packOrder = {};
    (packs || []).forEach(function (p, i) {
      packOrder[p.key] = i;
    });
    const packCount = Math.max((packs || []).length, 1);
    const packCenters = {};
    (packs || []).forEach(function (p, i) {
      const angle = (i / packCount) * Math.PI * 2;
      const ring = PACK_CLUSTER_RADIUS + (i % 2) * 35;
      packCenters[p.key] = {
        x: ring * Math.cos(angle),
        y: (i % 3 - 1) * 36,
        z: ring * Math.sin(angle),
      };
    });

    const byPack = {};
    nodes.forEach(function (n) {
      const key = n.catalog_key || '_unknown';
      if (!byPack[key]) byPack[key] = [];
      byPack[key].push(n);
    });

    Object.keys(byPack).forEach(function (packKey) {
      const packNodes = byPack[packKey];
      const idx = packOrder[packKey] != null ? packOrder[packKey] : 0;
      const angle = (idx / packCount) * Math.PI * 2;
      const ring = PACK_CLUSTER_RADIUS + (idx % 2) * 35;
      const center = packCenters[packKey] || {
        x: ring * Math.cos(angle),
        y: (idx % 3 - 1) * 36,
        z: ring * Math.sin(angle),
      };
      const shellR = packSphereRadius(packNodes.length);

      packNodes.forEach(function (node, i) {
        const offset = pointOnSphere(i, packNodes.length, shellR);
        node.x = center.x + offset.x;
        node.y = center.y + offset.y;
        node.z = center.z + offset.z;
        node._packCx = center.x;
        node._packCy = center.y;
        node._packCz = center.z;
        node._packShellR = shellR;
      });
    });
  }

  function releaseNodeFix(node) {
    node.fx = null;
    node.fy = null;
    node.fz = null;
  }

  function createPackSphereForce(nodes) {
    return function (alpha) {
      nodes.forEach(function (node) {
        if (node.fx != null || node.fy != null || node.fz != null) return;
        const cx = node._packCx;
        const cy = node._packCy;
        const cz = node._packCz;
        const shellR = node._packShellR;
        if (shellR == null || cx == null) return;
        const dx = node.x - cx;
        const dy = node.y - cy;
        const dz = node.z - cz;
        const dist = Math.sqrt(dx * dx + dy * dy + dz * dz) || 0.001;
        const pull = ((dist - shellR) / dist) * alpha * 0.45;
        node.vx -= dx * pull;
        node.vy -= dy * pull;
        node.vz -= dz * pull;
      });
    };
  }

  function nodeValFn(node) {
    const sizes = { agent: 14, deep_agent: 22, flow: 18 };
    return sizes[node.resource_type] || 14;
  }

  function nodeColorFn(node) {
    if (node.id === selectedNodeId) return COLOR_SELECTED;
    return node.installed ? COLOR_INSTALLED : COLOR_PENDING;
  }

  function showNodeDetail(node) {
    if (!node) {
      detailEl.textContent = 'Click a node to inspect.';
      return;
    }
    const status = node.installed
      ? '<span class="text-emerald-400 font-medium">Installed</span>' +
        (node.alias ? ' · ' + node.alias : '')
      : '<span class="text-blue-300 font-medium">Not installed</span>';
    const typeLabel = (node.resource_type || '').replace('_', ' ');
    detailEl.innerHTML =
      '<p class="font-semibold text-slate-200">' + node.name + '</p>' +
      '<p class="text-slate-500">' + node.pack_label + ' · ' + typeLabel + '</p>' +
      '<p class="mt-1">' + status + '</p>' +
      '<a class="mt-1.5 inline-block text-indigo-400 hover:text-indigo-300" href="' +
      (node.detail_url || '#') + '">' +
      (node.installed ? 'Open resource →' : 'View pack →') + '</a>';
  }

  function refreshNodeColors() {
    if (!graph3d) return;
    graph3d.nodeColor(nodeColorFn);
  }

  function linkDistanceFn(link) {
    if (link.edge_type === 'cross_pack') return 65;
    if (link.edge_type === 'sub_agent') return 38;
    return 48;
  }

  function applyForceLayout(g, nodes) {
    if (!g || typeof g.d3Force !== 'function') return;
    const charge = g.d3Force('charge');
    if (charge && typeof charge.strength === 'function') {
      charge.strength(-120);
    }
    const center = g.d3Force('center');
    if (center && typeof center.strength === 'function') {
      center.strength(0.04);
    }
    const link = g.d3Force('link');
    if (link && typeof link.distance === 'function') {
      link.distance(linkDistanceFn);
      link.strength(0.55);
    }
    g.d3Force('packSphere', createPackSphereForce(nodes || []));
  }

  function configureControls(g) {
    if (!g || typeof g.controls !== 'function') return;
    const controls = g.controls();
    if (!controls) return;
    controls.enableZoom = true;
    controls.enableRotate = true;
    controls.enablePan = true;
    if (controls.zoomSpeed != null) controls.zoomSpeed = 1.1;
    if (controls.rotateSpeed != null) controls.rotateSpeed = 0.85;
  }

  function destroyGraph3d() {
    if (!graph3d) return;
    try {
      if (typeof graph3d.pauseAnimation === 'function') {
        graph3d.pauseAnimation();
      }
      if (typeof graph3d._destructor === 'function') {
        graph3d._destructor();
      }
    } catch (e) {
      console.warn('graph destructor', e);
    }
    graph3d = null;
  }

  function initGraph3d(data, packs) {
    destroyGraph3d();
    selectedNodeId = null;
    showNodeDetail(null);

    const nodes = data.nodes.map(cloneNode);
    const links = data.links.map(cloneLink);
    seedPackSphereLayout(nodes, packs);

    if (!nodes.length) {
      summaryEl.textContent = 'No nodes match the current filters.';
      return;
    }

    const dim = graphDimensions();

    graph3d = ForceGraph3D()(container, { controlType: 'orbit' })
      .width(dim.width)
      .height(dim.height)
      .backgroundColor('#020617')
      .showNavInfo(false)
      .enablePointerInteraction(true)
      .enableNavigationControls(true)
      .enableNodeDrag(true)
      .warmupTicks(120)
      .nodeLabel(function (n) {
        return n.name + ' (' + n.pack_label + ')' + (n.installed ? ' · installed' : '');
      })
      .nodeVal(nodeValFn)
      .nodeRelSize(4)
      .nodeColor(nodeColorFn)
      .nodeOpacity(1)
      .linkColor('color')
      .linkOpacity(0.65)
      .linkWidth(function (l) {
        return l.edge_type === 'cross_pack' ? 1.5 : 1;
      })
      .linkDirectionalArrowLength(2.5)
      .linkDirectionalArrowRelPos(0.9)
      .d3AlphaDecay(0.028)
      .d3VelocityDecay(0.35)
      .onNodeDrag(function (node) {
        releaseNodeFix(node);
      })
      .onNodeDragEnd(function (node) {
        node.fx = node.x;
        node.fy = node.y;
        node.fz = node.z;
      })
      .onNodeClick(function (node, event) {
        if (event && event.detail === 2) {
          releaseNodeFix(node);
          if (typeof graph3d.d3ReheatSimulation === 'function') {
            graph3d.d3ReheatSimulation();
          }
          return;
        }
        selectedNodeId = node.id;
        showNodeDetail(node);
        refreshNodeColors();
      })
      .onBackgroundClick(function () {
        selectedNodeId = null;
        showNodeDetail(null);
        refreshNodeColors();
      });

    graph3d.graphData({ nodes: nodes, links: links });
    applyForceLayout(graph3d, nodes);
    configureControls(graph3d);
    if (typeof graph3d.resumeAnimation === 'function') {
      graph3d.resumeAnimation();
    }

    requestAnimationFrame(function () {
      resizeGraph();
      resetCamera(false);
    });
  }

  function resetCamera(animate) {
    if (!graph3d) return;
    const ms = animate === false ? 0 : 700;
    graph3d.cameraPosition(
      { x: CAMERA_DEFAULT.x, y: CAMERA_DEFAULT.y, z: CAMERA_DEFAULT.z },
      { x: 0, y: 0, z: 0 },
      ms
    );
  }

  function updateSummary(data) {
    const s = (fullGraph && fullGraph.summary) || {};
    const installedInView = data.nodes.filter(function (n) { return n.installed; }).length;
    summaryEl.textContent =
      data.nodes.length + ' nodes · ' + data.links.length + ' links · ' +
      installedInView + ' installed in view · ' +
      (s.installed_resources || 0) + ' installed total';
  }

  function applyFilters() {
    if (!fullGraph) return;
    try {
      const data = filteredGraphData();
      const packs = filterPack.value
        ? fullGraph.packs.filter(function (p) { return p.key === filterPack.value; })
        : fullGraph.packs;
      initGraph3d(data, packs);
      updateSummary(data);
    } catch (err) {
      console.error('Graph filter error:', err);
      summaryEl.textContent = 'Could not update graph. Try Reset view or reload.';
    }
  }

  async function loadGraph() {
    setLoading(true);
    summaryEl.textContent = 'Loading 3D cloud…';
    try {
      const res = await fetch(API_URL, { credentials: 'same-origin' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const payload = await res.json();
      fullGraph = {
        nodes: (payload.graph.nodes || []).map(cloneNode),
        links: (payload.graph.links || []).map(cloneLink),
        packs: (payload.graph.packs || []).slice(),
        summary: payload.summary || {},
      };
      populatePackFilter(fullGraph.packs);
      renderLegend(payload.legend);
      applyFilters();
    } catch (err) {
      summaryEl.textContent = 'Failed to load graph.';
      console.error(err);
    } finally {
      setLoading(false);
    }
  }

  openBtn.addEventListener('click', openModal);
  modal.querySelectorAll('[data-graph-dismiss]').forEach(function (el) {
    el.addEventListener('click', closeModal);
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && !modal.classList.contains('hidden')) closeModal();
  });
  filterPack.addEventListener('change', applyFilters);
  filterInstalled.addEventListener('change', applyFilters);
  filterCross.addEventListener('change', applyFilters);
  resetCameraBtn.addEventListener('click', function () {
    if (!graph3d) {
      applyFilters();
      return;
    }
    resetCamera(true);
  });

  window.addEventListener('resize', function () {
    if (!modal.classList.contains('hidden')) resizeGraph();
  });
})();
</script>
